<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Chan Nyein Tun</title>
    <meta name="description" content="Chan Nyein Tun - Frontend Engineer">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="icon" href="/favicon.ico">
    <style>
        * {
            box-sizing: border-box;
            font-family: sans-serif;
            margin: 0;
            padding: 0
        }

        body {
            padding: 50px;
            background-color: #fff;
            color: #111;
        }

        .c {
            display: grid;
            gap: 20px;
            grid-template: auto/repeat(8, 1fr);
        }

        main {
            grid-column: 3/span 4;
        }

        .i {
            font-size: 2.5rem;
            font-weight: 400;
            line-height: 3.5rem;
            margin-bottom: 40px;
            color: #444
        }

        .n {
            color: #007aff;
            font-weight: 600
        }

        .ab {
            font-size: 1.25rem;
            line-height: 2.25rem;
            color: #555
        }

        .smd {
            display: flex;
            gap: 32px;
            list-style: none;
            margin-top: 40px
        }

        .smd li a {
            display: flex;
            align-items: center;
            color: #111;
            font-size: 1.25rem;
            font-weight: 600;
            text-decoration: none
        }

        .smd li a img {
            display: none
        }

        .smd li a:hover {
            color: #0081ff
        }

        .smd li a[aria-label="Facebook"]::before {
            content: "Facebook "
        }

        .smd li a[aria-label="LinkedIn"]::before {
            content: "LinkedIn "
        }

        .smd li a[aria-label="GitHub"]::before {
            content: "GitHub "
        }

        .icon-moon {
            display: none
        }

        .icon-sun {
            display: none
        }

        @media screen and (max-width:1080px) {
            body {
                padding: 20px
            }

            .c {
                display: flex;
                flex-direction: column
            }
        }

        @media(prefers-color-scheme:dark) {
            body {
                background: #111;
                color: #fff
            }

            .smd li a,
            .ab,
            .i {
                color: #fff
            }

            .smd li a:hover {
                color: #0081ff
            }
        }
    </style>
</head>

<body>
    <div class="c">
        <main><img alt="Chan Nyein Tun&#x27;s profile picture" width="120" height="auto" src="/images/avatar.webp"
                style="border-radius:5px">
            <h1 class="i">Hello, I’m <strong class="n">Chan Nyein Tun</strong>, a curious developer who is motivated to
                advance and expand skills through challenging projects.</h1>
            <p class="ab">I have previously worked for 3 years
                building websites and web applications as a Frontend Engineer.</p>
            <ul class="smd">
                <li><a aria-label="Facebook" href="https://www.facebook.com/cnt.guru" target="_blank"><i
                            class="fab fa-facebook-f"></i></a></li>
                <li><a aria-label="LinkedIn" href="https://linkedin.com/in/channyeintun" target="_blank"><i
                            class="fab fa-linkedin-in"></i></a></li>
                <li><a aria-label="GitHub" href="https://github.com/channyeintun" target="_blank"><i
                            class="fab fa-github"></i></a></li>
            </ul>
        </main>
    </div>
    <script src="https://kit.fontawesome.com/xxx.js" crossorigin="anonymous"></script>
</body>

</html>
